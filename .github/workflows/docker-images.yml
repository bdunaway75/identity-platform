name: Build Docker images

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FRONTEND_IMAGE: bdunaway296/identity-platform-nginx
  AUTH_SERVER_IMAGE: bdunaway296/identity-platform-auth-server
  VITE_AUTH_SERVER_ORIGIN: ${{ vars.VITE_AUTH_SERVER_ORIGIN }}
  VITE_FRONTEND_ORIGIN: ${{ vars.VITE_FRONTEND_ORIGIN }}
  VITE_OIDC_CLIENT_ID: ${{ vars.VITE_OIDC_CLIENT_ID }}
  VITE_BETA_MODE: ${{ vars.VITE_BETA_MODE }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: frontend/Dockerfile
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          build-args: |
            VITE_AUTH_SERVER_ORIGIN=${{ env.VITE_AUTH_SERVER_ORIGIN }}
            VITE_FRONTEND_ORIGIN=${{ env.VITE_FRONTEND_ORIGIN }}
            VITE_OIDC_CLIENT_ID=${{ env.VITE_OIDC_CLIENT_ID }}
            VITE_BETA_MODE=${{ env.VITE_BETA_MODE }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,scope=frontend,mode=max

      - name: Build and push auth server image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: auth-server/Dockerfile
          push: true
          tags: |
            ${{ env.AUTH_SERVER_IMAGE }}:latest
            ${{ env.AUTH_SERVER_IMAGE }}:${{ github.sha }}
          cache-from: type=gha,scope=auth-server
          cache-to: type=gha,scope=auth-server,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deploy on droplet
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          script: |
            cd ${{ secrets.DROPLET_DEPLOY_PATH }}
            docker compose --env-file .env pull
            docker compose --env-file .env up -d --force-recreate
